<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT OFFICIAL GUILD</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }
        .box { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            border: 2px solid #ffd700; 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); 
            text-align: center; 
        }
        h1 { color: #ffd700; font-size: 26px; margin-bottom: 20px; text-transform: uppercase; }
        .footer { font-size: 12px; color: #777; margin-top: 25px; }
        .rules { text-align: left; margin: 20px 0; color: #ddd; line-height: 1.8; font-size: 15px; }
        .rules ul { padding-left: 20px; }
        input { 
            width: 90%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #25d366; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #128c7e; transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="welcomeScreen">
            <h1>WELCOME TO GT OFFICIAL</h1>
            <button onclick="showRules()">ENTER</button>
            <p class="footer">Created by SATISH</p>
        </div>

        <div id="rulesScreen" class="hidden">
            <h1>GUILD RULES</h1>
            <div class="rules">
                <ul>
                    <li>Player daily</li>
                    <li>Gujrati player online</li>
                    <li>Weekly glori push 7/8 k</li>
                    <li>Without guild test entry</li>
                    <li>Koi pan problem hoi guild leder sate vat karo</li>
                    <li>No hat other guild</li>
                </ul>
            </div>
            <p style="color: #ffd700; font-weight: bold;">THANK YOU FOR JOINING GT OFFICIAL 🤗</p>
            <button onclick="showForm()">JOIN GUILD</button>
        </div>

        <div id="formScreen" class="hidden">
            <h1>REGISTER</h1>
            <input type="text" id="playerName" placeholder="તમારું નામ" required>
            <input type="text" id="playerUID" placeholder="તમારી ગેમ UID" required>
            <button onclick="submitData()">SUBMIT & JOIN</button>
        </div>
    </div>

    <script>
        function showRules() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('rulesScreen').classList.remove('hidden');
        }

        function showForm() {
            document.getElementById('rulesScreen').classList.add('hidden');
            document.getElementById('formScreen').classList.remove('hidden');
        }

        async function submitData() {
            let name = document.getElementById("playerName").value;
            let uid = document.getElementById("playerUID").value;
            let phoneNumber = "917990843839";

            if (name === "" || uid === "") {
                alert("કૃપા કરીને નામ અને UID લખો!");
                return;
            }

            // Web3Forms API
            const formData = new FormData();
            formData.append("access_key", "B1d43e51-9bea-4e0a-8048-8830483ae5c9");
            formData.append("Name", name);
            formData.append("UID", uid);

            await fetch("https://api.web3forms.com/submit", { method: "POST", body: formData });

            // Professional WhatsApp Message
            let message = "🌟 *NEW GUILD APPLICATION* 🌟%0A%0A" + 
                          "━━━━━━━━━━━━━━━━━%0A" +
                          "👤 *પ્લેયર નામ:* " + name + "%0A" + 
                          "🆔 *ગેમ UID:* " + uid + "%0A" + 
                          "━━━━━━━━━━━━━━━━━%0A" +
                          "તપાસ કરીને રિપ્લાય આપો. 🚀";

            window.open("https://wa.me/" + phoneNumber + "?text=" + message, '_blank');
            
            alert("સફળતાપૂર્વક સબમિટ થઈ ગયું છે!");
            location.reload(); 
        }
    </script>
</body>
</html>
